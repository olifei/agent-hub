name: brand-search-optimization
displayName: Brand Search Optimization
description: >-
  A multi-agent workflow that optimizes retail product titles for brand search
  performance. It retrieves high-value keywords from a BigQuery product catalog,
  searches a target website using browser automation, and recommends title
  improvements to reduce zero/low-result search outcomes.
industry: retail
tags:
